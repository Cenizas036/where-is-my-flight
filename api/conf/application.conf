# ================================================================
#  WHERE IS MY FLIGHT — Play Framework Application Configuration
# ================================================================

play {
  http.secret.key = "changeme-in-production-use-a-real-key-at-least-256-bits"
  http.secret.key = ${?APPLICATION_SECRET}
  
  filters {
    enabled += play.filters.cors.CORSFilter
    enabled += play.filters.gzip.GzipFilter
    
    cors {
      allowedOrigins = ["http://localhost:8000", "http://localhost:80"]
      allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      allowedHttpHeaders = ["Accept", "Content-Type", "Origin", "X-Requested-With"]
    }
  }
  
  # WebSocket configuration
  server.websocket {
    frame.maxLength = 65536
    periodic.keep-alive.mode = "ping"
    periodic.keep-alive.max-idle = 30s
  }
}

# ─────────────────────────────────────────────
# Database — PostgreSQL via Slick
# ─────────────────────────────────────────────
slick.dbs.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://postgres:5432/wimf"
    url = ${?DB_URL}
    user = "wimf_user"
    user = ${?DB_USERNAME}
    password = "wimf_secret_change_me"
    password = ${?DB_PASSWORD}
    numThreads = 10
    maxConnections = 20
  }
}

# ─────────────────────────────────────────────
# Redis Configuration
# ─────────────────────────────────────────────
redis {
  host = "redis"
  host = ${?REDIS_HOST}
  port = 6379
  port = ${?REDIS_PORT}
  
  channels {
    flight-updates = "wimf:flights:updates"
    gate-updates = "wimf:gates:updates"
    predictions = "wimf:predictions:updates"
  }
}

# ─────────────────────────────────────────────
# Kafka Configuration
# ─────────────────────────────────────────────
kafka {
  bootstrap-servers = "kafka:9092"
  bootstrap-servers = ${?KAFKA_BROKER}
  group-id = "wimf-play-consumer"
  group-id = ${?KAFKA_GROUP_ID}
  
  topics {
    flight-events = "flight-events"
    flight-events = ${?KAFKA_FLIGHT_EVENTS_TOPIC}
    gate-updates = "gate-updates"
    gate-updates = ${?KAFKA_GATE_UPDATES_TOPIC}
  }
  
  consumer {
    auto-offset-reset = "latest"
    enable-auto-commit = true
    max-poll-records = 100
  }
}

# ─────────────────────────────────────────────
# External Flight APIs
# ─────────────────────────────────────────────
flight-api {
  provider = "aviationstack"
  provider = ${?FLIGHT_API_PROVIDER}
  
  aviationstack {
    base-url = "http://api.aviationstack.com/v1"
    api-key = ${?AVIATIONSTACK_API_KEY}
    poll-interval = 60s
  }
  
  flightaware {
    base-url = "https://aeroapi.flightaware.com/aeroapi"
    api-key = ${?FLIGHTAWARE_API_KEY}
    poll-interval = 30s
  }
}

# ─────────────────────────────────────────────
# Weather API
# ─────────────────────────────────────────────
weather {
  openweathermap {
    base-url = "https://api.openweathermap.org/data/2.5"
    api-key = ${?OPENWEATHER_API_KEY}
    cache-ttl = 300s
  }
}

# ─────────────────────────────────────────────
# Prediction Service
# ─────────────────────────────────────────────
prediction {
  model-path = "/opt/spark/models/delay_model"
  model-path = ${?SPARK_MODEL_PATH}
  cache-ttl = 120s
  refresh-interval = 300s
}

# ─────────────────────────────────────────────
# Akka (Play's actor system)
# ─────────────────────────────────────────────
akka {
  actor {
    default-dispatcher {
      fork-join-executor {
        parallelism-min = 4
        parallelism-factor = 2.0
        parallelism-max = 16
      }
    }
  }
  
  # Custom dispatcher for blocking I/O (external API calls)
  blocking-io-dispatcher {
    type = Dispatcher
    executor = "thread-pool-executor"
    thread-pool-executor {
      fixed-pool-size = 32
    }
    throughput = 1
  }
}
