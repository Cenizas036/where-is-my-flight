[phases.setup]
nixPkgs = ["php82", "php82Packages.composer"]
[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_pgsql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.curl", "composer"]

[phases.build]
cmds = [
  "cd web && composer install --no-dev --optimize-autoloader",
  "cd web && php artisan config:cache",
  "cd web && php artisan route:cache",
  "cd web && php artisan view:cache"
]

[start]
cmd = "cd web && php artisan serve --host=0.0.0.0 --port=$PORT"