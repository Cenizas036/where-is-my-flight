# ─────────────────────────────────────────────
# NGINX Configuration — Where Is My Flight
# ─────────────────────────────────────────────
# Routes:
#   /              → Laravel (PHP)
#   /api/v1/       → Play Framework (Scala)
#   /ws/           → Play WebSocket
# ─────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript 
               text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=60r/s;

    # ─────────────────────────────────────────
    # Upstreams
    # ─────────────────────────────────────────
    upstream laravel {
        server laravel-web:8000;
    }

    upstream play_api {
        server play-api:9000;
    }

    # ─────────────────────────────────────────
    # Main Server Block
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name whereismyflight.app localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Play API Routes ──
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://play_api/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── WebSocket Endpoint ──
        location /ws/ {
            proxy_pass http://play_api/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket timeouts
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Laravel Routes (default) ──
        location / {
            limit_req zone=web burst=100 nodelay;

            proxy_pass http://laravel/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Static Assets (Scala.js compiled output + CSS) ──
        location /js/scalajs/ {
            alias /var/www/html/public/js/scalajs/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://laravel;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Health check
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"wimf-nginx"}';
            add_header Content-Type application/json;
        }
    }
}
